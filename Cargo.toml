[package]
name = "bookmark_launcher"
version = "0.1.0"
edition = "2024"

[dependencies]
eframe = { version = "0.33", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
open = "5.0"
reqwest = { version = "0.12", features = ["blocking"] }
scraper = "0.19"
fuzzy-matcher = "0.3"
directories = "4.0"
native-windows-gui = { version = "1.0", optional = true }
native-windows-derive = { version = "1.0", optional = true }
fltk = { version = "1.3", optional = true }
windows = { version = "0.61", optional = true, features = [ "Win32_Foundation", "Win32_System_LibraryLoader", "Win32_UI_WindowsAndMessaging", "Win32_UI_Shell" ] }

[features]
# default keeps current behavior using eframe
default = ["backend-eframe"]
backend-eframe = ["eframe"]
backend-windows = ["native-windows-gui", "native-windows-derive"]
backend-fltk = ["fltk"]
backend-windows-rs = ["windows"]
backend-tui = ["ratatui", "crossterm"]

[dependencies.ratatui]
version = "0.24"
optional = true

[dependencies.crossterm]
version = "0.27"
optional = true
